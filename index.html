<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess my number game!</title>
    <link rel="stylesheet" href="Guess my number game.css">
</head>

<body>
    <div class="clue">
        <button id="Again">🔄Continue!</button>
        <p class="clue-text">
            Clue:Between 1 and 20
        </p>
        <button id="exit">💨Exit!</button>
        <button id="restart">🔁Restart!
            </button>
    </div>
    <div class="guess"> Guess my number!</div>
    <div>
        <p class="text">?</p>
        <p class="borderline"></p>
    </div>
    <div class="checkers">
        <input type="number" name="display" class="borderframe">
        <button class="check">✅❌Check!</button>


    </div>
    <div class="info">
        <p class="guessing">🤔Start guessing...</p>
        <p class="lives">💘💞Lives: 20;</p>
        <p class="score">🎁Score: 0;</p>
        <p class="highscore">🥰Highscore: 0;</p>

    </div>

    <script src="Guess my number game.js"></script>
</body>


</html>
